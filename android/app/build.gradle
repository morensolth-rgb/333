apply plugin: "com.android.application"
apply plugin: "org.jetbrains.kotlin.android"
apply plugin: "com.facebook.react"

react {}

def enableProguardInReleaseBuilds = false
def jscFlavor = 'org.webkit:android-jsc:+'

android {
    ndkVersion rootProject.ext.ndkVersion
    buildToolsVersion rootProject.ext.buildToolsVersion
    compileSdk rootProject.ext.compileSdkVersion

    namespace "com.fridactl"

    defaultConfig {
        applicationId "com.fridactl"
        minSdkVersion rootProject.ext.minSdkVersion
        targetSdkVersion rootProject.ext.targetSdkVersion
        versionCode 1
        versionName "1.0"
        externalNativeBuild {
            cmake {
                abiFilters "arm64-v8a"
                arguments "-DANDROID_STL=c++_static"
            }
        }
    }

    signingConfigs {
        debug {
            storeFile file('debug.keystore')
            storePassword 'android'
            keyAlias 'androiddebugkey'
            keyPassword 'android'
        }
    }

    buildTypes {
        debug { signingConfig signingConfigs.debug }
        release {
            signingConfig signingConfigs.debug
            minifyEnabled enableProguardInReleaseBuilds
            proguardFiles getDefaultProguardFile("proguard-android.txt"), "proguard-rules.pro"
        }
    }

    aaptOptions {
        noCompress "frida-server-arm64", "frida-gadget-arm64.so", "apktool.jar", "uber-signer.jar", "gg-mem-arm64"
    }

    // Build gg-mem native binary via NDK
    externalNativeBuild {
        cmake {
            path "src/main/jni/CMakeLists.txt"
            version "3.18.1+"
        }
    }
}

dependencies {
    implementation("com.facebook.react:react-android")
    implementation("com.facebook.react:hermes-android")
    implementation("com.github.topjohnwu.libsu:core:5.2.2")
    implementation("com.github.topjohnwu.libsu:service:5.2.2")
    implementation("org.apache.commons:commons-compress:1.26.1")
    implementation("org.tukaani:xz:1.9")
}

apply from: file("../../node_modules/@react-native-community/cli-platform-android/native_modules.gradle"); applyNativeModulesAppBuildGradle(project)

// Force Kotlin jvmTarget to match Java (AGP sets Java to 17)
tasks.withType(org.jetbrains.kotlin.gradle.tasks.KotlinCompile).configureEach {
    kotlinOptions {
        jvmTarget = "17"
    }
}

// After build, copy gg-mem binary to assets for deployment at runtime
tasks.whenTaskAdded { task ->
    if (task.name.contains("externalNativeBuild") || task.name == "mergeDebugAssets" || task.name == "mergeReleaseAssets") {
        task.doLast {
            def ggMemFile = file("${buildDir}/intermediates/cmake/debug/obj/arm64-v8a/gg-mem")
            if (!ggMemFile.exists()) {
                ggMemFile = file("${buildDir}/intermediates/cmake/release/obj/arm64-v8a/gg-mem")
            }
            if (ggMemFile.exists()) {
                def assetsDir = file("src/main/assets")
                assetsDir.mkdirs()
                def dest = new File(assetsDir, "gg-mem-arm64")
                ggMemFile.withInputStream { is -> dest.withOutputStream { os -> os << is } }
                println "✓ gg-mem copied to assets/gg-mem-arm64"
            }
        }
    }
}
