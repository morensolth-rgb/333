name: Build APK

on:
  push:
    branches: [main, master]
  workflow_dispatch:
    inputs:
      frida_version:
        description: 'Frida version (leave empty for latest)'
        required: false
        default: ''

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Node 18
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - name: Install JS dependencies
        run: npm install --legacy-peer-deps

      - name: Resolve Frida version
        id: frida
        run: |
          VERSION="${{ github.event.inputs.frida_version }}"
          if [ -z "$VERSION" ]; then
            VERSION=$(curl -sf \
              -H "Accept: application/vnd.github+json" \
              -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
              https://api.github.com/repos/frida/frida/releases/latest \
              | python3 -c "import sys,json; d=sys.stdin.read(); print(json.loads(d)['tag_name']) if d.strip() else None" 2>/dev/null || true)
          fi
          # Fallback to known stable version if API failed or rate-limited
          if [ -z "$VERSION" ]; then
            VERSION="16.5.9"
            echo "⚠ GitHub API unavailable — using fallback version $VERSION"
          fi
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Frida version: $VERSION"

      - name: Download frida-server arm64
        run: |
          V="${{ steps.frida.outputs.version }}"
          URL="https://github.com/frida/frida/releases/download/${V}/frida-server-${V}-android-arm64.xz"
          mkdir -p android/app/src/main/assets
          wget -q "$URL" -O fs.xz
          xz -d --stdout fs.xz > android/app/src/main/assets/frida-server-arm64
          chmod 755 android/app/src/main/assets/frida-server-arm64
          echo "frida-server: $(wc -c < android/app/src/main/assets/frida-server-arm64) bytes"

      - name: Download frida-inject arm64
        run: |
          V="${{ steps.frida.outputs.version }}"
          URL="https://github.com/frida/frida/releases/download/${V}/frida-inject-${V}-android-arm64.xz"
          wget -q "$URL" -O fi.xz
          xz -d --stdout fi.xz > android/app/src/main/assets/frida-inject-arm64
          chmod 755 android/app/src/main/assets/frida-inject-arm64
          echo "frida-inject: $(wc -c < android/app/src/main/assets/frida-inject-arm64) bytes"


      - name: Download frida-gadget arm64
        run: |
          V="${{ steps.frida.outputs.version }}"
          URL="https://github.com/frida/frida/releases/download/${V}/frida-gadget-${V}-android-arm64.so.xz"
          wget -q "$URL" -O fg.xz
          xz -d --stdout fg.xz > android/app/src/main/assets/frida-gadget-arm64.so
          echo "frida-gadget: $(wc -c < android/app/src/main/assets/frida-gadget-arm64.so) bytes"

      - name: Download apktool
        run: |
          wget -q "https://github.com/iBotPeaches/Apktool/releases/download/v2.9.3/apktool_2.9.3.jar" \
            -O android/app/src/main/assets/apktool.jar
          echo "apktool: $(wc -c < android/app/src/main/assets/apktool.jar) bytes"

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install NDK
        run: sdkmanager "ndk;25.1.8937393" --sdk_root=$ANDROID_HOME

      - name: Bundle JS (Release)
        run: |
          npx react-native bundle \
            --platform android \
            --dev false \
            --entry-file index.js \
            --bundle-output android/app/src/main/assets/index.android.bundle \
            --assets-dest android/app/src/main/res

      - name: Build Release APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleRelease --no-daemon
        env:
          GRADLE_OPTS: "-Dorg.gradle.daemon=false"
          JAVA_HOME: ${{ env.JAVA_HOME_17_X64 }}

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: FridaCtl-release
          path: android/app/build/outputs/apk/release/app-release.apk
          retention-days: 30
